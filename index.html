<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOURS | Luxury Bridal & Formal Wear</title>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  

    <header>
            <div class="announcement-bar">
                <p>Complimentary alterations on all bridal gowns — By appointment only</p>
            </div>

            <nav class="navbar">
                <div class="nav-left">
                    <a href="#home">Home</a>
                    <a href="#shop">Shop</a>
                    <a href="#about">About</a>
                    <a href="#blog">Blog</a>
                </div>

                <div class="nav-logo">
                    <a href="#">VELOURS</a>
                </div>

                <div class="nav-right">
                    <button class="icon-btn">
                        <img src="./assets/icons/search.svg" alt="Search">
                    </button>

                    <button class="icon-btn">
                        <img src="./assets/icons/shopping-bag.svg" alt="Cart">
                    </button>

                    <a href="#shop" class="shop-btn">Shop Now</a>
                </div>
            </nav>
    </header>

    <main>

        <section class="hero-section">                    
            <img
                class="hero-image"
                src="./assets/images/hero-image-2025.svg"
                alt="Bride wearing a luxury wedding gown"
            >

            <div class="hero-overlay"></div>

            <div class="hero-content">

                <p class="hero-subtitle">
                    2025 Bridal Collection
                </p>

                <h1 class="hero-title">
                    Dressed for your finest day
                </h1>

                <p class="hero-description">
                    Discover handcrafted bridal gowns and formal wear designed
                    to celebrate life's most memorable moments.
                </p>

                <div class="hero-actions">
                    <a href="#" class="btn-primary">
                        Explore Collection
                    </a>

                    <a href="#" class="btn-secondary">
                        Learn More
                    </a>
                </div>

            </div>
        </section>

    </main>

    <footer>

    </footer>

    <script src="./scripts/main.js"></script>
</body>
</html>
